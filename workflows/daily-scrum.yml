name: Team DODO Daily Scrum

on:
  schedule:
    # 한국 시간(KST) 오전 10시 = UTC 01:00
    # 요일 설정: 1-5 (월, 화, 수, 목, 금) -> 주말(0, 6)은 제외됩니다.
    - cron: '0 1 * * 1-5'
  # 필요할 때 직접 실행하기 위한 설정
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Scrum Template to Discord
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "DODO Manager",
                 "avatar_url": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Dodo.png",
                 "content": "## 🌅 Good Morning, Team DODO!\n오늘의 **데일리 스크럼** 시간입니다. 🦤\n\n**아래 양식을 복사하여 이 메시지에 [스레드]로 남겨주세요.**\n\n```markdown\n### 📅 2026-03-24 | @이름\n\n✅ **어제 완료한 일**\n- (이슈 번호와 함께 간략히 작성)\n\n🚀 **오늘 진행할 일**\n- (오늘의 주요 목표)\n\n🛑 **장애물 (Blockers)**\n- (도움이 필요한 부분이나 막힌 이슈)\n\n🔗 **관련 링크**\n- PR 또는 Issue 링크\n```"
               }' \
               ${{ secrets.DISCORD_SCRUM_WEBHOOK_URL }}